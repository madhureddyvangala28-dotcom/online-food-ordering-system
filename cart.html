<!DOCTYPE html>
<html>
<head>

<title>Cart - Madhu Foods</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>

body{
background:linear-gradient(#fff3b0,#ffe680);
font-family:Arial;
padding-top:100px;
}

/* NAVBAR */
.custom-navbar{
background:white;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
width:92%;
margin:auto;
margin-top:10px;
padding:10px 30px;
transition:0.3s;
}

.logo{
height:45px;
}

.nav-link{
position:relative;
font-weight:500;
margin-left:20px;
}

.nav-link:hover{
color:#d0b200;
transform:translateY(-2px);
}

.nav-link::after{
content:"";
position:absolute;
width:0;
height:2px;
background:#d0b200;
left:0;
bottom:-5px;
transition:0.3s;
}

.nav-link:hover::after{
width:100%;
}

.cart-badge{
background:red;
color:white;
font-size:12px;
padding:3px 8px;
border-radius:50%;
margin-left:5px;
}

/* CART */
.cart-container{
max-width:900px;
margin:40px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.cart-item{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:15px;
padding:15px;
background:#fafafa;
border-radius:10px;
}

.cart-item img{
width:80px;
border-radius:10px;
}

.qty-btn{
background:#d0b200;
color:white;
border:none;
padding:4px 10px;
margin:0 5px;
border-radius:5px;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:6px 12px;
border-radius:5px;
}

.total-box{
text-align:right;
margin-top:20px;
}

.place-btn{
margin-top:10px;
}

.empty{
text-align:center;
font-size:20px;
color:gray;
}

.html {
scroll-behavior: smooth;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light custom-navbar fixed-top">
<div class="container">

<a class="navbar-brand" href="index.html">
<img src="images/logo.png" class="logo">
</a>

<div class="navbar-nav ml-auto">

<a class="nav-link" href="profile.html">👤 Profile</a>

<li class="nav-item">
<a class="nav-link" href="index.html#wcu">Why Choose Us?</a>
</li>

<li class="nav-item">
<a class="nav-link" href="index.html#menu">Explore Menu</a>
</li>

<li class="nav-item">
<a class="nav-link cart-link" href="cart.html">
🛒 Cart <span class="cart-badge" id="cart-count">0</span>
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="checkout.html">Delivery</a>
</li>

<li class="nav-item">
<a class="nav-link" href="payment.html">Payment</a>
</li>


<li class="nav-item">
<a class="nav-link" href="index.html#follow">Follow Us</a>
</li>
</div>

</div>
</nav>

<!-- CART -->
<div class="cart-container">

<h2>Your Cart 🛒</h2>

<div id="cart-items"></div>

<div class="total-box">
<h4 id="total"></h4>
<button class="btn btn-success place-btn" onclick="checkout()">Place Order</button>
</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cart-items");

/* ================= DISPLAY ================= */
function displayCart(){

container.innerHTML = "";

if(cart.length === 0){
container.innerHTML = "<p class='empty'>Your cart is empty 🛒</p>";
document.getElementById("total").innerHTML = "";
return;
}

let total = 0;

cart.forEach((item,index)=>{

let qty = item.qty || 1;
let subtotal = item.price * qty;
total += subtotal;

container.innerHTML += `
<div class="cart-item">

<img src="${item.image}">

<div style="flex:1; margin-left:10px;">
<h5>${item.name}</h5>
<p>₹${item.price}</p>

<div>
<button class="qty-btn" onclick="changeQty(${index},-1)">-</button>
<span>${qty}</span>
<button class="qty-btn" onclick="changeQty(${index},1)">+</button>
</div>

<p><strong>Subtotal:</strong> ₹${subtotal}</p>
</div>

<button class="remove-btn" onclick="removeItem(${index})">Remove</button>

</div>
`;

});

document.getElementById("total").innerHTML = "Total: ₹" + total;

localStorage.setItem("cart", JSON.stringify(cart));

updateCartCount();

}


/* ================= QUANTITY ================= */
function changeQty(index,change){

if(!cart[index].qty){
cart[index].qty = 1;
}

cart[index].qty += change;

if(cart[index].qty <= 0){
cart.splice(index,1);
}

displayCart();

}


/* ================= REMOVE ================= */
function removeItem(index){
cart.splice(index,1);
displayCart();
}


/* ================= CHECKOUT ================= */
function checkout(){

if(cart.length === 0){
alert("Cart is empty!");
return;
}

window.location.href = "checkout.html";

}


/* ================= CART COUNT ================= */
function updateCartCount(){

let count = document.getElementById("cart-count");

if(count){
count.innerText = cart.length;
}

}


/* ================= NAVBAR SCROLL ================= */
window.addEventListener("scroll",function(){

let navbar=document.querySelector(".custom-navbar");

if(window.scrollY>50){
navbar.style.padding="5px 20px";
}else{
navbar.style.padding="10px 30px";
}

});


displayCart();

</script>

</body>
</html>
