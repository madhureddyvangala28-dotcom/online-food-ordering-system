<style>

body{
font-family:Arial;
background:linear-gradient(#fff3b0,#ffe680);

/* Navbar */

/* Floating Navbar */

.custom-navbar{

background:white;

border-radius:15px;

box-shadow:0 8px 20px rgba(0,0,0,0.15);

width:92%;

margin:auto;

margin-top:10px;

padding:10px 30px;

}

/*Logo*/

height:45px;
}

/* Nav links */

.nav-link{

font-weight:500;

margin-left:20px;

transition:0.3s;

}

/* Hover animation */

.nav-link:hover{

color:#d0b200;

transform:translateY(-2px);

}

/* Menu Card Container */

.menu-container{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* Menu Items */

.menu-item{
text-align:center;
margin-bottom:30px;
transition:0.3s;
}

.menu-item:hover{
transform:translateY(-5px);
}

.menu-item img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.menu-item h5{
font-weight:bold;
}

.menu-item button{
margin-top:10px;
}
.nav-link{
position:relative;
font-weight:500;
margin-left:20px;
transition:0.3s;
}

.nav-link::after{

content:"";

position:absolute;

width:0;

height:2px;

background:#d0b200;

left:0;

bottom:-5px;

transition:0.3s;

}

.nav-link:hover::after{

width:100%;

}
.cart-badge{

background:rgb(255, 0, 0);

color:hwb(0 100% 0%);

font-size:12px;

padding:3px 8px;

border-radius:50%;

margin-left:5px;

}
.menu-item{

transition:0.4s;

}

.menu-item.hide{

opacity:0;

transform:scale(0.9);

}

.filter-btn{

margin:5px;

}

</style>

</head>

let container = document.getElementById("menu-items");

items.forEach(item=>{

container.innerHTML += `

<div class="col-md-3 menu-item ${category} ${item.name.toLowerCase().includes("chicken") ? "nonveg" : "veg"}">

<img src="${item.image}" class="food-img">

<h5>${item.name}</h5>

<p>₹${item.price}</p>

<button class="btn btn-warning"
onclick="addToCart('${item.name}',${item.price},'${item.image}'); flyToCart(this.parentElement.querySelector('img'));">
Add To Cart
</button>

</div>

`;

});


function addToCart(name,price,image){

let isLoggedIn = localStorage.getItem("loggedIn");

if(!isLoggedIn){

localStorage.setItem("redirectPage", window.location.href);

alert("Please login first to add items to cart");

window.location.href="login.html";

return;

}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let product={
name:name,
price:price,
image:image
};

cart.push(product);

localStorage.setItem("cart",JSON.stringify(cart));

updateCartCount();

alert(name+" added to cart");

}

function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let count = document.getElementById("cart-count");

if(count){
count.innerText = cart.length;
}

}

updateCartCount();
window.addEventListener("scroll",function(){

let navbar=document.querySelector(".custom-navbar");

if(window.scrollY>50){

navbar.style.padding="5px 20px";

navbar.style.boxShadow="0 5px 15px rgba(0,0,0,0.2)";

}

else{

navbar.style.padding="10px 30px";

navbar.style.boxShadow="0 8px 20px rgba(0,0,0,0.15)";

}

});
function flyToCart(img){

let cart = document.getElementById("cart-icon");

let flyingImg = img.cloneNode();

let rect = img.getBoundingClientRect();
let cartRect = cart.getBoundingClientRect();

flyingImg.style.position = "fixed";
flyingImg.style.left = rect.left + "px";
flyingImg.style.top = rect.top + "px";
flyingImg.style.width = "80px";
flyingImg.style.zIndex = "1000";
flyingImg.style.transition = "all 0.8s ease";

document.body.appendChild(flyingImg);

setTimeout(function(){

flyingImg.style.left = cartRect.left + "px";
flyingImg.style.top = cartRect.top + "px";
flyingImg.style.width = "20px";
flyingImg.style.opacity = "0.5";

},50);

setTimeout(function(){
flyingImg.remove();
},800);

}
function filterFood(type){

let items = document.querySelectorAll(".menu-item");

items.forEach(function(item){

let text = item.innerText.toLowerCase();

if(type === "all"){
item.style.display = "block";
}
else if(type === "veg" && !text.includes("chicken") && !text.includes("fish") && !text.includes("mutton")){
item.style.display = "block";
}
else if(type === "nonveg" && (text.includes("chicken") || text.includes("fish") || text.includes("mutton"))){
item.style.display = "block";
}
else if(type === "desserts" && text.includes("cake") || text.includes("ice") || text.includes("sweet")){
item.style.display = "block";
}
else{
item.style.display = "none";
}

});

}
