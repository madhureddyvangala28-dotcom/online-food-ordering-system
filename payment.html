<!DOCTYPE html>
<html>
<head>

<title>UPI Payment - Madhu Foods</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>

body{
background:linear-gradient(#fff3b0,#ffe680);
font-family:Arial;
padding-top:100px;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:50px;
height:50px;
border:5px solid #eee;
border-top:5px solid #d0b200;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* NAVBAR */
.custom-navbar{
background:white;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
width:92%;
margin:auto;
margin-top:10px;
padding:10px 30px;
transition:0.3s;
}

.logo{
height:45px;
}

.nav-link{
position:relative;
font-weight:500;
margin-left:20px;
}

.nav-link:hover{
color:#d0b200;
transform:translateY(-2px);
}

.nav-link::after{
content:"";
position:absolute;
width:0;
height:2px;
background:#d0b200;
left:0;
bottom:-5px;
transition:0.3s;
}

.nav-link:hover::after{
width:100%;
}

.cart-badge{
background:red;
color:white;
font-size:12px;
padding:3px 8px;
border-radius:50%;
margin-left:5px;
}

/* PAYMENT BOX */
.payment-box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
text-align:center;
margin:40px auto;
max-width:600px;
animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* QR */
.qr-img{
width:220px;
margin:20px 0;
transition:0.3s;
}

.qr-img:hover{
transform:scale(1.05);
}

/* BUTTON ANIMATION */
.btn-success{
transition:0.3s;
}

.btn-success:hover{
transform:scale(1.05);
box-shadow:0 6px 18px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="spinner"></div>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light custom-navbar fixed-top">

<div class="container">

<a class="navbar-brand" href="index.html">
<img src="images/logo.png" class="logo">
</a>

<ul class="navbar-nav ml-auto">

<li class="nav-item">
<a class="nav-link" href="login.html" id="login-btn">Login</a>
</li>

<li class="nav-item" id="user-section" style="display:none;">
<a class="nav-link" href="profile.html">👤 Profile</a>
</li>

<li class="nav-item">
<a class="nav-link" href="index.html#wcu">Why Choose Us?</a>
</li>

<li class="nav-item">
<a class="nav-link" href="index.html#menu">Explore Menu</a>
</li>

<li class="nav-item">
<a class="nav-link" href="cart.html">
🛒 Cart <span class="cart-badge" id="cart-count">0</span>
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="checkout.html">Delivery</a>
</li>

<li class="nav-item">
<a class="nav-link" href="payment.html">Payment</a>
</li>

<li class="nav-item">
<a class="nav-link" href="index.html#follow">Follow Us</a>
</li>

</ul>

</div>

</nav>

<!-- PAYMENT -->
<div class="container">

<div class="payment-box">

<h2>Scan & Pay with UPI</h2>

<p>Google Pay | PhonePe | Paytm</p>

<img src="images/upi-qr.png" class="qr-img">

<p><strong>UPI ID:</strong> madhufoods@upi</p>

<button class="btn btn-success" onclick="paymentDone()">
Payment Completed
</button>

</div>

</div>

<script>

/* LOADER */
window.addEventListener("load",()=>{
document.getElementById("loader").style.display="none";
});

/* LOGIN */
let user = localStorage.getItem("currentUser");

if(user){
document.getElementById("login-btn").style.display="none";
document.getElementById("user-section").style.display="block";
}

/* PAYMENT */
function paymentDone(){

alert("🎉 Payment Successful!\nOrder Placed Successfully.");

localStorage.removeItem("cart");

window.location.href="success.html";

}

/* CART COUNT */
function updateCartCount(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let count = document.getElementById("cart-count");
if(count){
count.innerText = cart.length;
}
}
updateCartCount();

/* NAVBAR SCROLL */
window.addEventListener("scroll",function(){

let navbar=document.querySelector(".custom-navbar");

if(window.scrollY>50){
navbar.style.padding="5px 20px";
navbar.style.boxShadow="0 5px 15px rgba(0,0,0,0.2)";
}else{
navbar.style.padding="10px 30px";
navbar.style.boxShadow="0 8px 20px rgba(0,0,0,0.15)";
}

});

</script>

</body>
</html>
